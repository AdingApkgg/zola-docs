tagline = "Forget dependencies. Everything you need in one binary."
get_started = "Get started"
no_deps_title = "No dependencies"
no_deps_desc = "Zola comes as a single executable with Sass compilation, syntax highlighting, table of contents and many other features that traditionally require setting up a dev environment or adding some JavaScript libraries."
