        <script>
        document.addEventListener('turbo:load', () => {
          quicklink.listen({
            ignores: [
              (uri, elem) => elem && elem.hasAttribute('data-noquicklink')
            ]
          });
        });
        </script>
        <script src="https://zola.docs.saop.cc/js/instant.page.js" type="module"></script>
        <script>
        document.addEventListener('turbo:load', async () => {
          const pv = document.getElementById('pv');
          const uv = document.getElementById('uv');
          const ppv = document.getElementById('ppv');
          if (!pv || !uv || !ppv) return;
          try {
            const res = await fetch('https://bsz.saop.cc/api', {
              method: 'POST',
              credentials: 'include',
              headers: { 'x-bsz-referer': location.href }
            });
            const { success, data } = await res.json();
            if (success) {
              pv.textContent = data.site_pv;
              uv.textContent = data.site_uv;
              ppv.textContent = data.page_pv;
            }
          } catch (_) {}
        });
        </script>
