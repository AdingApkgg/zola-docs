        <script>
        (function() {
            // 仅在首页执行跳转逻辑，避免干扰深层链接访问
            if (window.location.pathname !== '/' && window.location.pathname !== '/en/') return;

            const lang = localStorage.getItem('zola_lang_pref');
            const isEnPath = window.location.pathname.startsWith('/en/');
            
            if (lang) {
                if (lang === 'en' && !isEnPath) window.location.href = '/en/';
                else if (lang === 'zh' && isEnPath) window.location.href = '/';
            } else {
                const browserLang = navigator.language || navigator.userLanguage;
                if (!browserLang.startsWith('zh') && !isEnPath) {
                    window.location.href = '/en/';
                }
            }
        })();
        </script>

        <script>
        (async () => {
          const res = await fetch('https://bsz.saop.cc/api', {
            method: 'POST',
            credentials: 'include',
            headers: { 'x-bsz-referer': location.href }
          });
          const { success, data } = await res.json();
          if (success) {
            document.getElementById('pv').textContent = data.site_pv;
            document.getElementById('uv').textContent = data.site_uv;
            document.getElementById('ppv').textContent = data.page_pv;
