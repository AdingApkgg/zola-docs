    <script>
        const swup = new Swup({
            containers: ['#swup'],
            animationSelector: '[class*="transition-"]',
            plugins: [
                new SwupParallelPlugin(),
                new SwupPreloadPlugin(),
                new SwupScrollPlugin(),

                new SwupProgressPlugin(),
                new SwupHeadPlugin({
                    persistAssets: true,
                    persistTags: 'link[rel="stylesheet"], script[src], style',
                }),
                new SwupBodyClassPlugin(),
            ],
        });
        swup.hooks.on('content:replace', (visit) => {
            const doc = visit.to.document;
            if (!doc) return;
            const newLang = doc.documentElement?.lang;
            if (newLang) document.documentElement.lang = newLang;
            // 同步 header/footer 中的动态内容（语言切换链接等）
            const pairs = [['header', 'header'], ['footer', 'footer']];
            pairs.forEach(([sel]) => {
                const oldEl = document.querySelector(sel);
                const newEl = doc.querySelector(sel);
                if (oldEl && newEl) oldEl.innerHTML = newEl.innerHTML;
            });
            // 旧容器绝对定位到新容器同一位置，实现重叠过渡
            const prev = document.querySelector('.is-previous-container');
            const next = document.querySelector('#swup:not(.is-previous-container)');
            if (prev && next) {
                const rect = next.getBoundingClientRect();
                prev.style.position = 'absolute';
                prev.style.top = (rect.top + window.scrollY) + 'px';
                prev.style.left = rect.left + 'px';
                prev.style.width = rect.width + 'px';
            }
        });
    </script>

    <script>
        function initComments(retry) {
            retry = retry || 0;
            var el = document.getElementById('Comments');
            if (!el) return;
            var pageKey = el.dataset.pageKey;
            if (!pageKey) return;
            if (el.dataset.artalkInited === pageKey) return;
            if (typeof Artalk === 'undefined') {
                if (retry < 50) setTimeout(function() { initComments(retry + 1); }, 100);
                return;
            }
            Artalk.init({
                el: '#Comments',
                pageKey: pageKey,
                pageTitle: document.title,
                server: 'https://artalk.saop.cc',
                site: 'Zola',
                darkMode: 'true',
            });
            el.dataset.artalkInited = pageKey;
        }
        initComments();
        document.addEventListener('swup:page:view', function() { initComments(); });
    </script>
    <script>
        async function updateAnalytics() {
            const pv = document.getElementById("pv");
            const uv = document.getElementById("uv");
            const ppv = document.getElementById("ppv");
            if (!pv || !uv || !ppv) return;
            try {
                const res = await fetch("https://bsz.saop.cc/api", {
                    method: "POST",
                    credentials: "include",
                    headers: { "x-bsz-referer": location.href },
                });
                const { success, data } = await res.json();
                if (success) {
                    pv.textContent = data.site_pv;
                    uv.textContent = data.site_uv;
                    ppv.textContent = data.page_pv;
                }
            } catch (_) { }
        }
        updateAnalytics();
        document.addEventListener("swup:page:view", updateAnalytics);
    </script>
