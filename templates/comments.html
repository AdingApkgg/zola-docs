{% extends "index.html" %}

{% block title %}{{ page.title }} | {{ config.title }}{% endblock title %}

{% block content %}
<div class="container" style="padding: 2rem 0;">
    <h1>{{ page.title }}</h1>
    <div class="content">
        {{ page.content | safe }}
    </div>

    <hr style="margin: 2rem 0;">

    <div id="Comments" data-page-key="{{ page.path | safe }}"></div>
</div>
{% endblock content %}
