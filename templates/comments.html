{% extends "index.html" %}

{% block title %}{{ page.title }} | {{ config.title }}{% endblock title %}

{% block head %}
    <link href="{{ get_url(path='css/Artalk.css') }}" rel="stylesheet">
    <script src="{{ get_url(path='js/Artalk.js') }}" defer></script>
    <script>
    document.addEventListener('turbo:load', () => {
        const el = document.getElementById('Comments');
        if (!el) return;
        const pageKey = '{{ page.path | safe }}';
        if (el.dataset.artalkInited === pageKey) return;
        if (typeof Artalk === 'undefined') return;
        Artalk.init({
            el:        '#Comments',
            pageKey:   pageKey,
            pageTitle: '{{ page.title }}',
            server:    'https://artalk.saop.cc',
            site:      '{{ config.title }}',
            darkMode:  'auto',
        });
        el.dataset.artalkInited = pageKey;
    });
    </script>
{% endblock head %}

{% block content %}
<div class="container" style="padding: 2rem 0;">
    <h1>{{ page.title }}</h1>
    <div class="content">
        {{ page.content | safe }}
    </div>

    <hr style="margin: 2rem 0;">

    <div id="Comments"></div>
</div>
{% endblock content %}
